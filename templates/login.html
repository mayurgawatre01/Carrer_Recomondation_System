<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | CareerAI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>

  <nav class="navbar">
    <a href="/" class="nav-brand">🎯 CareerAI</a>
    <div class="nav-links">
      <a href="/register" class="btn-nav">Register</a>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <h2>Welcome Back</h2>
      <p class="auth-sub">Login to get your career recommendations</p>

      {% if error %}
        <div class="alert-error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Your password" required/>
        </div>
        <button type="submit" class="btn-primary full-width">Login →</button>
      </form>

      <p class="auth-link">New here? <a href="/register">Create an account</a></p>
    </div>
  </div>

</body>
</html>
